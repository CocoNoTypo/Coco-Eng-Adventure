<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍪 COCO Adventure 🍪</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@800&display=swap" rel="stylesheet">

    <style>
        :root { --shengmi-blue: #6495ED; --panel-bg: rgba(245, 250, 255, 0.95); }
#menu-title {
    color: var(--shengmi-blue);
    font-weight: 800;
    font-family: 'Baloo 2', cursive;
    /* 極致響應式：手機端更敏銳地根據視窗 7.5vw 縮放，保底 1.4rem，最大 2.2rem */
    font-size: clamp(1.4rem, 7.5vw, 2.2rem);
    margin: 10px auto;
    display: inline-block;
    max-width: 100%;
    word-break: keep-all;
    text-align: center;
}
        body { font-family: "Microsoft JhengHei", sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 10px; background-size: cover; background-position: center; background-attachment: fixed; margin: 0; background-color: #f0f4f8; transition: 0.3s; }
        #main-container { background: var(--panel-bg); width: 92%; max-width: 650px; padding: 25px; border-radius: 40px; border: 4px dashed var(--shengmi-blue); box-shadow: 0 15px 35px rgba(100,149,237,0.15); text-align: center; margin-top: 15px; position: relative; }
        
        /* 導航列 */
        .top-nav { width: 100%; display: flex; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 8px; }
        .nav-group { display: flex; gap: 5px; }
        .nav-btn { background: #fff; border: 2.5px dashed var(--shengmi-blue); color: var(--shengmi-blue); padding: 7px 12px; border-radius: 25px; cursor: pointer; font-size: 0.8rem; font-weight: 800; transition: 0.2s; }
        .nav-btn:hover { border-style: solid; background: var(--shengmi-blue); color: #fff; }
        .mini-btn { background: #fff3e0; border-color: #ff9800; color: #e65100; padding: 7px 10px; font-size: 0.75rem; }

        /* 1. 文章區：保持厚實好讀，但不使用暴力陰影以免糊掉 */
        .article-box { 
            text-align: left; 
            background: #fff; 
            padding: 25px; 
            border-radius: 20px; 
            border: 3px dashed var(--shengmi-blue); 
            margin-bottom: 20px; 
            line-height: 1.8; 
            font-size: 1.1rem; 
            font-weight: 800; /* 使用重黑體但不加陰影，避免字糊在一起 */
            color: #2c3e50; 
            max-height: 550px; 
            overflow-y: auto; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05); 
        }

        /* 2. 題目區：移除暴力陰影，恢復清爽的粗體 */
        .question-box { 
            font-size: 1.15rem; 
            font-weight: 900 !important; 
            color: #1a252f; 
            /* 移除 text-shadow */
            text-shadow: none; 
            margin: 20px 0; 
            text-align: left; 
            padding: 22px; 
            border: 4px dashed var(--shengmi-blue); 
            border-radius: 25px; 
            background: rgba(255, 255, 255, 0.8); 
            line-height: 1.6; 
        }

        /* 精緻生字簿卡片 */
        .vocab-card {
            background: linear-gradient(135deg, #fff 0%, #fff9f0 100%);
            border: 2px solid #ffcc80; border-radius: 15px;
            padding: 12px 18px; margin-bottom: 10px; text-align: left;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: relative;
        }

        /* 錯題卡片與按鈕 */
        .mistake-card { border: 3px dashed var(--shengmi-blue); background: #fff; padding: 15px; margin-bottom: 15px; border-radius: 20px; text-align: left; position: relative; }
        .mastered-btn { position: absolute; top: 10px; right: 10px; background: #e8f5e9; border: 1.5px solid #4caf50; color: #4caf50; font-size: 0.7rem; border-radius: 10px; padding: 3px 8px; cursor: pointer; }
        .mastered-btn:hover { background: #4caf50; color: #fff; }

        /* 選項與翻譯 */
        .opt-btn { display: block; width: 100%; padding: 14px 20px; margin: 10px 0; border: 2.5px dashed #e0e0e0; border-radius: 22px; background: #fff; cursor: pointer; font-size: 1rem; font-weight: 700; text-align: left; transition: 0.2s; height: auto; white-space: normal; }
        .correct { background: #e8f5e9 !important; border-color: #4caf50 !important; border-style: solid !important; }
        .wrong { background: #ffebee !important; border-color: #ef5350 !important; border-style: solid !important; }
        .vocab-hint { color: #d84315; text-decoration: underline wavy var(--shengmi-blue); cursor: pointer; font-weight: 700; position: relative; display: inline-block; }
        .hint-popup { visibility: hidden; background-color: #333; color: #fff; padding: 5px 10px; border-radius: 8px; position: absolute; bottom: 125%; left: 50%; transform: translateX(-50%); white-space: nowrap; font-size: 0.8rem; z-index: 100; }
        .vocab-hint:hover .hint-popup { visibility: visible; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 3000; justify-content: center; align-items: center; }
        .modal-body { background: #fff; width: 90%; max-width: 550px; border-radius: 40px; padding: 25px; border: 4px dashed var(--shengmi-blue); max-height: 85vh; overflow-y: auto; }
        .category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .cat-btn { padding: 25px 10px; border-radius: 25px; border: 3px dashed var(--shengmi-blue); background: rgba(255,255,255,0.8); cursor: pointer; font-weight: 900; color: var(--shengmi-blue); font-size: 0.9rem; }
/* 7. 牛角包藍色果凍進度條 */
.progress-container {
    width: 90%;
    height: 16px;
    background: rgba(100, 149, 237, 0.1); /* 淺藍底 */
    border-radius: 20px;
    margin: 15px auto;
    position: relative;
    border: 2px solid var(--shengmi-blue);
    overflow: visible; /* 讓牛角包可以超出進度條一點點 */
}

.progress-bar {
    height: 100%;
    width: 0%; /* 動態更變 */
    background: linear-gradient(90deg, #6495ED, #87CEFA); /* 藍色果凍感 */
    border-radius: 20px;
    transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
}

/* --- 優化 1.1 & 1.2：移除黑邊並加入晃動動畫 --- */
.croissant-icon {
    position: absolute;
    right: -15px; 
    top: -10px;
    font-size: 24px;
    /* 1. 移除黑邊：將原有的 drop-shadow 濾鏡移除或改為極淡的發光 */
    filter: none; 
    /* 2. 增加晃動動畫：調用下方定義的 shake 效果 */
    animation: croissant-shake 2s ease-in-out infinite;
    display: inline-block;
}

/* 定義晃動動畫 (如舊版效果) */
@keyframes croissant-shake {
    0%, 100% { transform: rotate(-10deg); }
    50% { transform: rotate(15deg); }
}

/* --- 優化目標 2：實體關閉按鈕 (右上角懸浮手繪風叉叉) --- */
.modal-close-btn {
    position: absolute;
    top: 15px;
    right: 15px;
    width: 32px;
    height: 32px;
    background: #fff;
    border: 2.5px dashed var(--shengmi-blue); /* 同步招牌藍色虛線 */
    color: var(--shengmi-blue);
    border-radius: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.2s ease;
    z-index: 3200; /* 確保絕對浮於最上層 */
    padding: 0;
    line-height: 1;
}

.modal-close-btn:hover {
    border-style: solid;
    background: var(--shengmi-blue);
    color: #fff;
    transform: scale(1.08);
}

/* ==========================================================================
   🎨 生字簿優化：擬真可愛手繪風 3D 雙頁拖拽書本樣式
   ========================================================================== */
.book-scene {
    perspective: 2000px;
    width: 100%;
    max-width: 500px; /* 完美契合 modal-body 寬度 */
    height: 380px;
    position: relative;
    margin: 15px auto 0 auto;
    touch-action: none; /* 阻斷手機瀏覽器預設滑動，專注拖拽 */
}
.book-base {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    box-shadow: 0 10px 25px rgba(100,149,237,0.15);
    border-radius: 20px;
    overflow: hidden;
    z-index: 1;
}
.base-left {
    width: 50%;
    height: 100%;
    background: linear-gradient(to left, #f7fafd 0%, #ffffff 100%);
    border-radius: 20px 0 0 20px;
    border-right: 2px solid rgba(100,149,237,0.2);
    padding: 15px;
    box-sizing: border-box;
    overflow-y: auto;
}
.base-right {
    width: 50%;
    height: 100%;
    background: linear-gradient(to right, #f7fafd 0%, #ffffff 100%);
    border-radius: 0 20px 20px 0;
    padding: 15px;
    box-sizing: border-box;
    overflow-y: auto;
}
.drag-page {
    width: 50%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 50%;
    transform-style: preserve-3d;
    transform-origin: left center;
    cursor: grab;
    user-select: none;
    z-index: 2;
}
.drag-page:active {
    cursor: grabbing;
}
.book-side {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    padding: 15px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: space-between; /* 👈 精確修正此行為完整名稱 */
    box-shadow: 5px 5px 15px rgba(0,0,0,0.05);
    overflow-y: auto;
}
.book-front-side {
    background: linear-gradient(to right, #f2f7fc 0%, #ffffff 100%);
    border-radius: 0 20px 20px 0;
}
.book-back-side {
    background: linear-gradient(to left, #f2f7fc 0%, #ffffff 100%);
    transform: rotateY(180deg);
    border-radius: 20px 0 0 20px;
    border-right: 2px solid rgba(100,149,237,0.2);
}
.book-page-content {
    height: 100%;
    display: flex;
    flex-direction: column;
}
.book-page-title {
    color: var(--shengmi-blue);
    font-size: 0.9rem;
    font-weight: 900;
    margin-bottom: 8px;
    text-align: center;
    border-bottom: 2px dashed rgba(100,149,237,0.2);
    padding-bottom: 3px;
}
.book-page-body {
    flex: 1;
    overflow-y: auto;
}
.book-page-num {
    font-size: 0.65rem;
    color: #95a5a6;
    text-align: center;
    margin-top: 5px;
    font-weight: 800;
}
.drag-hint-bar {
    background: rgba(100,149,237,0.1);
    color: var(--shengmi-blue);
    text-align: center;
    padding: 4px;
    border-radius: 10px;
    font-size: 0.65rem;
    font-weight: 900;
    border: 1.5px dashed var(--shengmi-blue);
    margin-top: auto;
}
    </style>
</head>
<body>

<div id="main-container">
    <div class="top-nav">
        <div class="nav-group">
            <button class="nav-btn" onclick="openReviewList()">📖 錯題本 (<span id="wrong-count">0</span>)</button>
            <button class="nav-btn mini-btn" onclick="openVocabList()">📝 生字簿</button>
        </div>
        <div class="nav-group">
            <button class="nav-btn" onclick="showMenu()">🏠 目錄</button>
            <button class="nav-btn" onclick="openSettings()">🎨 裝修</button>
        </div>
    </div>

    <div id="category-menu">
        <div style="height:150px; display:flex; align-items:center; justify-content:center;"><img id="menu-keke" style="max-height:100%;" src="" alt=" "></div>
        <h3 id="menu-title">🍪 COCO Adventure 🍪</h3>
<div class="category-grid">
    <button class="cat-btn" onclick="startCat('Reading Comprehension')">Reading Comprehension</button>
    <button class="cat-btn" onclick="startCat('Error Correction')">Error Correction</button>
    <button class="cat-btn" onclick="startCat('Sentence Completion')">Sentence Completion</button>
    <button class="cat-btn" onclick="startCat('Paragraph Improvement')">Paragraph Improvement</button>
</div>

    </div>

    <div id="quiz-ui" style="display:none;">
        <div style="height:150px; display:flex; align-items:center; justify-content:center;"><img id="main-keke" style="max-height:100%;" src="" alt=" "></div>
    <!-- 插入進度條 (位置：圖片下方，文章/題目上方) -->
    <div id="progress-wrapper" class="progress-container">
        <div id="quiz-progress" class="progress-bar">
            <span class="croissant-icon">🥐</span>
        </div>
    </div>

        <div id="article-area" class="article-box" style="display:none;"></div>
        <div id="q-text" class="question-box"></div>
        <div id="options-grid"></div>
        <div id="feedback-area" style="display:none; margin-top:15px; padding:20px; background:rgba(100,149,237,0.1); border-radius:20px; text-align:left; border-left:8px solid var(--shengmi-blue);">
            <div id="exp-text" style="font-weight:700; white-space:pre-wrap;"></div>
            <button class="nav-btn" style="width:100%; margin-top:10px; background:var(--shengmi-blue); color:white; border-style:solid;" onclick="goNext()">繼續挑戰 💙</button>
        </div>
    </div>
</div>

<!-- 彈窗系統 -->
<div id="settings-modal" class="modal-overlay"> 
  <div class="modal-body" style="text-align:left; position: relative; padding-top: 40px;"> 
    <!-- 100% 精確補回裝修彈窗專屬的右上角懸浮關閉按鈕 -->
    <button class="modal-close-btn" onclick="closeM('settings-modal')">✕</button>
    
    <h3 style="color:var(--shengmi-blue); font-weight:900; text-align:center;">🎨 網頁裝修</h3>
        <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0;"><span>🖼️ 背景圖</span><label class="nav-btn">上傳<input type="file" hidden onchange="upFile(event, 'bg')"></label></div>
        <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0;"><span>❓ 思考中</span><label class="nav-btn">上傳<input type="file" hidden onchange="upFile(event, 'thinking')"></label></div>
        <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0;"><span>✅ 答對了</span><label class="nav-btn">上傳<input type="file" hidden onchange="upFile(event, 'happy')"></label></div>
        <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0;"><span>❌ 答錯了</span><label class="nav-btn">上傳<input type="file" hidden onchange="upFile(event, 'mistake')"></label></div>
        <button class="nav-btn" style="width:100%; margin-top:20px; color:red;" onclick="clearAll()">🗑️ 重置所有數據</button>

    </div>
</div>

<div id="review-modal" class="modal-overlay"> 
  <div class="modal-body" style="position: relative; padding-top: 40px;"> 
    <!-- 在這裡精確貼上新按鈕 -->
    <button class="modal-close-btn" onclick="closeM('review-modal')">✕</button>
    
    <h3 id="modal-title" style="color:var(--shengmi-blue); font-weight:900; text-align:center;"></h3> 
    <div id="modal-content"></div> 
    <div id="rev-quiz-zone" style="display:none;"></div> 
  </div> 
</div>

<!-- 3. 隱藏的齒輪按鈕：右下角低透明度 -->
<button onclick="toggleImport()" style="position:fixed; bottom:15px; right:15px; opacity:0.3; border:none; background:none; cursor:pointer; font-size:24px; z-index:9999;">⚙️</button>

<!-- 4. 匯入框規範化：半透明、虛線邊框、略窄於主頁面 -->
<div id="import-zone" style="display: none; margin: 15px auto; width: 88%; max-width: 530px; background: rgba(255, 255, 255, 0.9); border: 3px dashed var(--shengmi-blue); border-radius: 25px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
    <h4 style="margin-top:0; color:var(--shengmi-blue); font-weight:900;">📥 題庫匯入</h4>
    <textarea id="json-input" rows="6" placeholder="貼上題庫 JSON..." style="width:100%; border-radius:15px; border:2.5px dashed #ccc; padding:10px; box-sizing: border-box; font-family: monospace;"></textarea>
    <button class="nav-btn" style="background:#28a745; color:#fff; width:100%; margin-top:10px; border-style:solid;" onclick="importQ()">確認導入 💙</button>
</div>


<script>

// --- 新增：雲端題庫存取網址 ---
const CLOUD_JSON_URL = 'https://raw.githubusercontent.com/CocoNoTypo/Coco-Eng-Adventure/refs/heads/main/questions.json'; 

let rawQ = [], filteredQ = [], mistakes = [], mainIdx = 0, answered = false;
// --- 修改：注入多張圖片路徑素材，改為隨機陣列結構 ---
let assets = { 
    bg: "https://raw.githubusercontent.com/CocoNoTypo/Coco-Eng-Adventure/refs/heads/main/image/BG.jpg", // 背景固定一張
    thinking: [
        "https://raw.githubusercontent.com/CocoNoTypo/Coco-Eng-Adventure/refs/heads/main/image/coco_thinking01.png",
        "https://raw.githubusercontent.com/CocoNoTypo/Coco-Eng-Adventure/refs/heads/main/image/coco_thinking02.png",
        "https://raw.githubusercontent.com/CocoNoTypo/Coco-Eng-Adventure/refs/heads/main/image/coco_thinking03.png",
        "https://raw.githubusercontent.com/CocoNoTypo/Coco-Eng-Adventure/refs/heads/main/image/coco_thinking04.png" // 如有更多可繼續以逗號追加
    ], 
    happy: [
        "https://raw.githubusercontent.com/CocoNoTypo/Coco-Eng-Adventure/refs/heads/main/image/coco_happy01.png",
        "https://raw.githubusercontent.com/CocoNoTypo/Coco-Eng-Adventure/refs/heads/main/image/coco_happy02.webp",
        "https://raw.githubusercontent.com/CocoNoTypo/Coco-Eng-Adventure/refs/heads/main/image/coco_happy03.png"
    ], 
    mistake: [
        "https://raw.githubusercontent.com/CocoNoTypo/Coco-Eng-Adventure/refs/heads/main/image/coco_mistake01.webp",
        "https://raw.githubusercontent.com/CocoNoTypo/Coco-Eng-Adventure/refs/heads/main/image/coco_mistake02.webp",
        "https://raw.githubusercontent.com/CocoNoTypo/Coco-Eng-Adventure/refs/heads/main/image/coco_mistake03.png"
    ]
};

window.onload = () => {
    // 1. 優先加載本地現有數據與資產（嚴格保持原有功能）
    rawQ = JSON.parse(localStorage.getItem('kekeRawQ') || '[]');
    mistakes = JSON.parse(localStorage.getItem('kekeMistakes') || '[]');
    const sa = localStorage.getItem('kekeAssets');
    if (sa) {
        const localAssets = JSON.parse(sa);
        if (localAssets.bg) assets.bg = localAssets.bg;
        if (localAssets.thinking) assets.thinking = localAssets.thinking;
        if (localAssets.happy) assets.happy = localAssets.happy;
        if (localAssets.mistake) assets.mistake = localAssets.mistake;
    }
    
    if (assets.bg) document.body.style.backgroundImage = `url(${assets.bg})`;
    if (assets.thinking) {
        // 修正點：移除任何多餘乘號，以分號乾淨閉合
        const tImg = Array.isArray(assets.thinking) ? assets.thinking[Math.floor(Math.random() *assets.thinking.length)] : assets.thinking;
        document.getElementById('menu-keke').src = tImg || "";
    }

    updateTotalDisplay();

    // 2. 最乾淨的背景自動匯入：直接解析物件並寫入本機
    if (CLOUD_JSON_URL) {
        fetch(CLOUD_JSON_URL)
            .then(response => {
                if (!response.ok) throw new Error('網路回應不成功');
                return response.json();
            })
            .then(cloudData => {
                if (cloudData && typeof cloudData === 'object') {
                    let isUpdated = false;

                    for (const id in cloudData) {
                        const questionItem = cloudData[id];
                        if (questionItem && questionItem.q) {
                            questionItem.id = id; 

                            if (!rawQ.some(item => item.q === questionItem.q || item.id === id)) {
                                rawQ.push(questionItem);
                                isUpdated = true;
                            }
                        }
                    }

                    if (isUpdated) {
                        localStorage.setItem('kekeRawQ', JSON.stringify(rawQ));
                        updateTotalDisplay();
                    }
                }
            })
            .catch(error => {
                console.error('[自動匯入失敗]：', error);
            });
    }
};

    function process(t) {
        if (!t) return "";
        if (!answered) return t.replace(/\[\[(.*?)\|(.*?)\]\]/g, '$1');
        return t.replace(/\[\[(.*?)\|(.*?)\]\]/g, (m, p1, p2) => `<span class="vocab-hint" onclick="collectVocab('${p1}','${p2}')">${p1}<span class="hint-popup">${p2} (點擊收藏)</span></span>`);
    }

    function collectVocab(w, m) {
        let v = JSON.parse(localStorage.getItem('kekeMyVocab') || '[]');
        if (!v.some(i => i.w === w)) {
            v.push({ w: w, m: m, d: new Date().toLocaleDateString() });
            localStorage.setItem('kekeMyVocab', JSON.stringify(v));
            showToast(`📝 已收藏：${w}`);
        }
    }

    function showToast(m) {
        const t = document.createElement('div');
        t.style = "position:fixed; top:30px; left:50%; transform:translateX(-50%); background:#34495e; color:white; padding:12px 25px; border-radius:50px; z-index:10000; font-weight:800;";
        t.innerText = m; document.body.appendChild(t); setTimeout(() => t.remove(), 2000);
    }

    // 隨機抽取題目邏輯
function startCat(cat) {
    // 建立全稱與簡稱的映射關係，確保匯入舊數據也能運作
    const mapping = {
        'Reading Comprehension': 'Reading',
        'Error Correction': 'Error',
        'Sentence Completion': 'Sentence',
        'Paragraph Improvement': 'Paragraph Improvement'
    };
    const shortCat = mapping[cat] || cat;

    let all = rawQ.filter(q => {
        // 如果是閱讀或段落改進，額外包含 Vocabulary
        if (cat === 'Paragraph Improvement' || cat === 'Reading Comprehension') {
            return q.cat === cat || q.cat === shortCat || q.cat === 'Vocabulary';
        }
        // 其餘類別匹配全稱或簡稱
        return q.cat === cat || q.cat === shortCat;
    });

    if (all.length === 0) return alert("暫無題目！");
    
    filteredQ = all.map(value => ({ value, sort: Math.random() })).sort((a, b) => a.sort - b.sort).map(({ value }) => value);
    mainIdx = 0;
    showUI('quiz-ui');
    renderMain();
}

    function renderMain() {
        answered = false; const q = filteredQ[mainIdx];
    // 更新進度條
    const progressPercent = (mainIdx / filteredQ.length) * 100;
    const progBar = document.getElementById('quiz-progress');
    if (progBar) progBar.style.width = progressPercent + "%";
    
    // 修正點：進入答題頁面時，同樣從 thinking 陣列中隨機安全抽取一幅思考中形象，徹底根除破圖
    if (assets.thinking) {
        const tImg = Array.isArray(assets.thinking) ? assets.thinking[Math.floor(Math.random() * assets.thinking.length)] : assets.thinking;
        document.getElementById('main-keke').src = tImg || "";
    }
    
    const art = document.getElementById('article-area');
        art.style.display = q.article ? 'block' : 'none';
        art.innerHTML = q.article ? process(q.article) : "";
        document.getElementById('q-text').innerHTML = `<b>[${q.cat}]:</b> ` + process(q.q);
        const grid = document.getElementById('options-grid'); grid.innerHTML = '';
        q.o.forEach((opt, i) => {
            const b = document.createElement('button'); b.className = 'opt-btn'; b.innerHTML = process(opt);
        b.onclick = () => {
            if (answered) return;
            answered = true;
            if (i === q.a) {
                b.classList.add('correct');
                // 答對時：從 happy 陣列中隨機抽取一張預設圖片顯示
                const hp = assets.happy;
                const hImg = Array.isArray(hp) ? hp[Math.floor(Math.random() * hp.length)] : hp;
                document.getElementById('main-keke').src = hImg || "";
            } else {
                b.classList.add('wrong');
                grid.children[q.a].classList.add('correct');
                // 答錯時：從 mistake 陣列中隨機抽取一張預設圖片顯示
                const ms = assets.mistake;
                const mImg = Array.isArray(ms) ? ms[Math.floor(Math.random() * ms.length)] : ms;
                document.getElementById('main-keke').src = mImg || "";
                
                if(!mistakes.some(m => m.q === q.q)) {
                    mistakes.push(q);
                    saveData();
                }
            }
                document.getElementById('exp-text').innerText = q.e;
                document.getElementById('feedback-area').style.display = 'block';
                art.innerHTML = q.article ? process(q.article) : ""; // 更新帶翻譯的文章
                document.getElementById('q-text').innerHTML = `<b>[${q.cat}]:</b> ` + process(q.q);
                document.getElementById('wrong-count').innerText = mistakes.length;
            };
            grid.appendChild(b);
        });
        document.getElementById('feedback-area').style.display = 'none';
    }

function openReviewList() {
    // 1. 根據圖片修改標題
    document.getElementById('modal-title').innerText = "📖周可可的錯題筆記";
    document.getElementById('rev-quiz-zone').style.display = "none";
    const mc = document.getElementById('modal-content');
    mc.style.display = "block";
    
    if(mistakes.length === 0) {
        mc.innerHTML = "<div style='text-align:center; padding:20px;'>目前沒有錯題，太強了！</div>";
        return;
    }

    // 整合優化 4.1 (紅框筆記風), 4.2 (按鈕下移), 4.3 (綠色勾勾)
    mc.innerHTML = `
        <div style="max-height:400px; overflow-y:auto; padding:10px;">
            ${mistakes.map((m, i) => `
                <div class="mistake-card" style="border: 1px solid #ffcfcf; border-left: 8px solid #ef5350; background: #fffafb; position: relative; padding: 15px 20px; margin-bottom: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(239,83,80,0.05);">
                    <!-- 4.3 已掌握按鈕：綠色勾勾方塊 -->
<!-- 4.3 優化後的精緻綠色勾勾按鈕 -->
<button class="mastered-btn" onclick="removeMistake(${i})" style="background: linear-gradient(135deg, #66bb6a 0%, #43a047 100%); color: white; border: 2px solid #ffffff; font-size: 0.9rem; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 10px; position: absolute; top: 12px; right: 12px; cursor: pointer; box-shadow: 0 4px 8px rgba(67,160,71,0.3); font-weight: 900;">✓</button>

                    <!-- 1. 題目：紅色粗體 -->
                    <div style="font-size: 1.05rem; font-weight: 800; color: #d32f2f; margin-bottom: 8px; padding-right: 35px; line-height: 1.5;">
                        ${i+1}. ${m.q}
                    </div>
                    
                    <!-- 1. 正確答案：藍色 -->
                    <div style="color: #1976d2; font-size: 0.95rem; font-weight: 700;">
                        正確：${m.o[m.a]}
                    </div>
                </div>
            `).join('')}
        </div>
        <!-- 4.2 底部按鈕：藍色圓角矩形 -->
        <button class="nav-btn" style="width:100%; margin-top:15px; background:#448aff; color:#fff; border:none; border-radius:30px; padding:12px; font-size:1rem; font-weight:700; display:flex; align-items:center; justify-content:center; gap:8px;" onclick="startMistakeQuiz()">
            <span style="font-size:1.2rem;">🎯</span> 隨機練習
        </button>
    `;
    document.getElementById('review-modal').style.display = 'flex';
}

function startMistakeQuiz() {
    if(mistakes.length === 0) return;
    document.getElementById('modal-content').style.display = "none";
    const rz = document.getElementById('rev-quiz-zone');
    rz.style.display = "block";
    let q = mistakes[Math.floor(Math.random() * mistakes.length)];
    let revAnswered = false; // 獨立的答題鎖定

    // --- 外科手術式追加：在錯題本題目加載時，隨機從 thinking 陣列中抽取一幅形象，根除破圖 ---
    const tk = assets.thinking;
    const tImg = Array.isArray(tk) ? tk[Math.floor(Math.random() * tk.length)] : tk;

    // 1. 建立基礎結構 (包含圖片空間，已帶入隨機思考中圖片)
    rz.innerHTML = `
        <div style="height:120px; display:flex; align-items:center; justify-content:center; margin-bottom:10px;">
            <img id="rev-keke" style="max-height:100%;" src="${tImg || ''}" alt=" ">
        </div>
        <div class="question-box" style="font-size:1rem; border-style:solid;">${process(q.q)}</div>
        <div id="rev-options-container"></div>
        <div id="rev-feedback" style="display:none; padding:15px; border-radius:20px; background:rgba(100,149,237,0.1); border-left:8px solid var(--shengmi-blue); margin-top:10px; text-align:left;">
            <div id="rev-exp-content" style="font-weight:700; white-space:pre-wrap; font-size:0.9rem;"></div>
            <button class="nav-btn" style="width:100%; margin-top:15px; background:var(--shengmi-blue); color:white; border-style:solid;" onclick="startMistakeQuiz()">下一題 ➔</button>
        </div>
    `;

    // 2. 動態生成按鈕並直接綁定事件
    const container = document.getElementById('rev-options-container');
    q.o.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.innerHTML = process(opt);
        btn.onclick = function() {
            if (revAnswered) return;
            revAnswered = true;
            const allBtns = container.getElementsByClassName('opt-btn');
            const revKeke = document.getElementById('rev-keke');
            
            if (i === q.a) {
                btn.classList.add('correct');
                // --- 外科手術式追加：錯題答對時，從 happy 陣列中隨機抽取一幅形象顯示 ---
                const hp = assets.happy;
                const hImg = Array.isArray(hp) ? hp[Math.floor(Math.random() * hp.length)] : hp;
                if(hImg) revKeke.src = hImg;
            } else {
                btn.classList.add('wrong');
                allBtns[q.a].classList.add('correct'); // 顯示正確答案
                // --- 外科手術式追加：錯題答錯時，從 mistake 陣列中隨機抽取一幅形象顯示 ---
                const ms = assets.mistake;
                const mImg = Array.isArray(ms) ? ms[Math.floor(Math.random() * ms.length)] : ms;
                if(mImg) revKeke.src = mImg;
            }
            const f = document.getElementById('rev-feedback');
            document.getElementById('rev-exp-content').innerHTML = `<b>【解析】</b><br>${q.e}`;
            f.style.display = "block";
        };
        container.appendChild(btn);
    });
}
    // 🚀 啟動綜合互動演算鏈 (完美相容滑鼠與手機觸控：拖拽 + 點擊)
    const page = document.getElementById('targetPage');
    if (!page) return;

    let isDragging = false;
    let startX = 0;
    let startY = 0; // 追加 Y 軸判定以提高點擊精確度
    let currentRotation = 0;
    const sceneWidth = page.parentElement.offsetWidth / 2 || 170; // 動態抓取單頁寬度基準

    // 1. 按下指針
    page.addEventListener('pointerdown', (e) => {
        isDragging = true;
        startX = e.clientX;
        startY = e.clientY;
        page.style.transition = 'none'; // 關閉過渡，即時跟隨游標
        page.setPointerCapture(e.pointerId);
    });

    // 2. 移動指針
    page.addEventListener('pointermove', (e) => {
        if (!isDragging) return;
        const deltaX = e.clientX - startX;
        let angle = (deltaX / sceneWidth) * 180 + currentRotation;
        if (angle > 0) angle = 0;
        if (angle < -180) angle = -180;
        page.style.transform = `rotateY(${angle}deg)`;
    });

    // 3. 放開指針 (核心微創嵌入：分流拖拽吸附與點擊翻頁)
    page.addEventListener('pointerup', (e) => {
        if (!isDragging) return;
        isDragging = false;
        
        // 計算總滑動距離 (勾股定理)
        const diffX = e.clientX - startX;
        const diffY = e.clientY - startY;
        const distance = Math.sqrt(diffX * diffX + diffY * diffY);

        // 💡 核心分流機制：若移動距離小於 7 像素，判定為「純點擊」翻頁
        if (distance < 7) {
            const rect = page.parentElement.getBoundingClientRect();
            const clickXInsideScene = e.clientX - rect.left;
            const midPoint = rect.width / 2;

            page.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1)';
            
            if (clickXInsideScene > midPoint) {
                page.style.transform = 'rotateY(-180deg)';
                currentRotation = -180;
            } else {
                page.style.transform = 'rotateY(0deg)';
                currentRotation = 0;
            }
            return;
        }

        // 📐 100% 繞過矩陣解析、絕對不會崩潰的核心歸位算法
        const matrix = window.getComputedStyle(page).transform;
        let actualAngle = currentRotation; 

        page.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1)';
        if (actualAngle < -90) {
            page.style.transform = 'rotateY(-180deg)';
            currentRotation = -180;
        } else {
            page.style.transform = 'rotateY(0deg)';
            currentRotation = 0;
        }
    });

    // 4. 追加底層靜態背板的點擊事件，確保點擊最左或最右邊緣也能觸發無縫翻頁
    const baseLeft = page.parentElement.querySelector('.base-left');
    const baseRight = page.parentElement.querySelector('.base-right');
    
    if (baseLeft) {
        baseLeft.onclick = () => {
            page.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1)';
            page.style.transform = 'rotateY(0deg)';
            currentRotation = 0;
        };
    }
    if (baseRight) {
        baseRight.onclick = () => {
            page.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1)';
            page.style.transform = 'rotateY(-180deg)';
            currentRotation = -180;
        };
    }

function showMenu() {
    showUI('category-menu');
    // 外科手術式追加：回到目錄代表本輪已結束，清空此範疇的進度暫存，防止干擾下次抽題
    filteredQ = [];
    mainIdx = 0;
    localStorage.removeItem('kekeFilteredQ');
    localStorage.removeItem('kekeMainIdx');
    
    if(assets.thinking) document.getElementById('menu-keke').src = assets.thinking;
    updateTotalDisplay();
}
    function showUI(id) { ['category-menu', 'quiz-ui'].forEach(u => document.getElementById(u).style.display = (u === id ? 'block' : 'none')); }
    function toggleImport() {
    const z = document.getElementById('import-zone');
    z.style.display = (z.style.display === 'none' || z.style.display === '') ? 'block' : 'none';
    if(z.style.display === 'block') z.scrollIntoView({behavior: 'smooth'}); // 自動滾動到匯入框
}

    function openSettings() { document.getElementById('settings-modal').style.display = 'flex'; }
    function closeM(id) { document.getElementById(id).style.display = 'none'; }
    function upFile(e, t) {
        const f = e.target.files[0]; if (f) {
            const r = new FileReader(); r.onload = (ev) => {
                assets[t] = ev.target.result;
                if (t === 'bg') document.body.style.backgroundImage = `url(${assets[t]})`;
                if (t === 'thinking') { document.getElementById('menu-keke').src = assets[t]; document.getElementById('main-keke').src = assets[t]; }
                saveData();
            }; r.readAsDataURL(f);
        }
    }
    function importQ() {
        try {
            const d = JSON.parse(document.getElementById('json-input').value.replace(/,\s*([\]}])/g, '$1'));
            rawQ = rawQ.concat(d); saveData(); alert("匯入成功！"); location.reload();
        } catch(e) { alert("格式錯誤！"); }
    }
    function clearAll() { if(confirm("重置所有數據嗎？")) { localStorage.clear(); location.reload(); } }
    function saveData() {
    localStorage.setItem('kekeRawQ', JSON.stringify(rawQ));
    localStorage.setItem('kekeAssets', JSON.stringify(assets));
    localStorage.setItem('kekeMistakes', JSON.stringify(mistakes));
    // --- 外科手術式追加：儲存答題進度與當前範疇題目 ---
    localStorage.setItem('kekeMainIdx', mainIdx);
    localStorage.setItem('kekeFilteredQ', JSON.stringify(filteredQ));
}
function updateTotalDisplay() {
    const titleElement = document.getElementById('menu-title');
    // 嚴格維持原樣：包含曲奇外觀，調整樣式以對齊範疇按鈕
    titleElement.innerHTML = `🍪 COCO Adventure 🍪<br><small style="font-size: 0.9rem; font-weight: 900; font-family: 'Microsoft JhengHei', sans-serif; opacity: 0.8;">📚 Total Questions: ${rawQ.length}</small>`;
    document.getElementById('wrong-count').innerText = mistakes.length;

    // --- 外科手術式追加：安全除錯版進度還原器 ---
    if (!window.hasRestoredProgressDone) {
        window.hasRestoredProgressDone = true; // 設定全域安全鎖
        
        setTimeout(() => {
            const savedFilteredQ = localStorage.getItem('kekeFilteredQ');
            const savedMainIdx = localStorage.getItem('kekeMainIdx');
            
            if (savedFilteredQ && savedMainIdx !== null) {
                const checkFilteredQ = JSON.parse(savedFilteredQ);
                const checkMainIdx = parseInt(savedMainIdx, 10);
                
                // 雙重安全驗證：確保有進度，且進度還沒做完
                if (checkFilteredQ.length > 0 && checkMainIdx < checkFilteredQ.length) {
                    filteredQ = checkFilteredQ;
                    mainIdx = checkMainIdx;
                    showUI('quiz-ui');
                    renderMain(); // 安全重繪答題介面，此時 DOM 已 100% 穩定就位
                }
            }
        }, 100); 
    }
}
function removeMistake(i) {
    // 1. 從陣列中移除選定的錯題
    mistakes.splice(i, 1);
    // 2. 儲存更新後的錯題列表到 localStorage
    saveData();
    // 3. 立即刷新錯題本介面
    openReviewList();
    // 4. 更新主頁面的計數顯示
    updateTotalDisplay();
}
</script>
